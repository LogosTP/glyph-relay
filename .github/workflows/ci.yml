# SPDX-License-Identifier: Elastic-2.0
#
# CI for glyph-relay. Stdlib-only project: there is intentionally NO `pip install`
# step anywhere in this workflow — adding one is a policy violation. The job runs the
# unittest suite plus the two repo guards (SPDX headers, committed-secret scan).
name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # (a) Test suite — stdlib unittest, no dependencies to install.
      - name: Unit tests
        run: python3 -m unittest discover -s tests

      # (b) SPDX header guard — every tracked glyph_relay/ + tests/ *.py.
      - name: SPDX header check
        run: bash tools/check_spdx.sh

      # (c) Committed-secret scan — fail if key material / private env files slip in.
      - name: Secret scan
        run: bash tools/secret_scan.sh
